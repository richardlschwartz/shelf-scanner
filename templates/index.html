<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelf Out-of-Stock Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }
        .upload-area {
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 60px 40px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.03);
        }
        .upload-area:hover {
            border-color: #e74c3c;
            background: rgba(231,76,60,0.05);
        }
        .upload-area.dragover {
            border-color: #e74c3c;
            background: rgba(231,76,60,0.1);
        }
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .upload-hint {
            color: #666;
            font-size: 0.85rem;
        }
        input[type="file"] { display: none; }
        .preview-area {
            margin-top: 20px;
            display: none;
        }
        .preview-area img {
            max-width: 300px;
            max-height: 200px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .file-name {
            margin-top: 10px;
            color: #aaa;
            font-size: 0.9rem;
        }
        .analyze-btn {
            margin-top: 24px;
            padding: 14px 40px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            display: none;
        }
        .analyze-btn:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shelf Out-of-Stock Scanner</h1>
        <p class="subtitle">Upload a photo of a retail shelf to detect empty positions</p>

        <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-area" id="dropZone">
                <div class="upload-icon">📷</div>
                <div class="upload-text">Drop a shelf photo here or click to browse</div>
                <div class="upload-hint">Supports JPG, PNG, WebP — up to 50MB</div>
            </div>
            <input type="file" name="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp">

            <div class="preview-area" id="previewArea">
                <img id="previewImg" src="" alt="Preview">
                <div class="file-name" id="fileName"></div>
            </div>

            <button type="submit" class="analyze-btn" id="analyzeBtn">Analyze Shelf</button>
        </form>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const fileName = document.getElementById('fileName');
        const analyzeBtn = document.getElementById('analyzeBtn');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showPreview(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                showPreview(e.target.files[0]);
            }
        });

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewArea.style.display = 'block';
                fileName.textContent = file.name;
                analyzeBtn.style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
